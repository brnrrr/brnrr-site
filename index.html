<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brnrr — Make your data uncompromisable</title>
<meta name="description" content="brnrr — Make your data uncompromisable. Something is coming.">
<style>
  :root{
    /* ============================================================
       THEME — default is near-black.
       To switch to DARK MILITARY GREEN instead, comment out the
       two "black" lines below and uncomment the two "green" lines.
       ============================================================ */
    --bg:#000000;                 /* black */
    --bg2:#0c0c0c;                /* black */
    /* --bg:#0a0f0a;  */          /* green */
    /* --bg2:#10180f; */          /* green */

    --fg:#f4f6fb;
    --muted:#8a8f99;
    --accent:#e02424;             /* RED button + accents */
    --glow:rgba(224,36,36,.22);   /* red glow */
    --line:rgba(255,255,255,.10);
    --field:rgba(255,255,255,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 700px at 50% -10%, var(--bg2) 0%, var(--bg) 60%);
    color:var(--fg);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  /* faint animated glow behind the logo */
  .aura{
    position:fixed;
    top:38%;left:50%;
    width:680px;height:680px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, var(--glow) 0%, transparent 65%);
    filter:blur(10px);
    pointer-events:none;
    animation:pulse 6s ease-in-out infinite;
    z-index:0;
  }
  @keyframes pulse{0%,100%{opacity:.55;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}

  main{
    position:relative;z-index:1;
    flex:1;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;
    padding:40px 24px;
    gap:34px;
  }
  .logo{
    width:min(280px,72vw);
    height:auto;
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .1s forwards;
  }
  .logo path,.logo .wave{fill:var(--fg)}
  .logo .wave{fill:none;stroke:var(--fg);stroke-linecap:round}

  .tagline{
    font-size:clamp(1.05rem,3.4vw,1.6rem);
    font-weight:500;
    letter-spacing:.5px;
    color:var(--fg);
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .35s forwards;
  }
  .sub{
    font-size:.9rem;
    color:var(--muted);
    max-width:440px;
    line-height:1.6;
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .55s forwards;
  }
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  form{
    display:flex;
    gap:10px;
    width:min(440px,90vw);
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .7s forwards;
  }
  input[type=email]{
    flex:1;
    background:var(--field);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    color:var(--fg);
    font-size:.95rem;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  input[type=email]::placeholder{color:var(--muted)}
  input[type=email]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
  button{
    background:var(--accent);
    color:#ffffff;
    border:none;
    border-radius:10px;
    padding:14px 22px;
    font-size:.95rem;
    font-weight:700;
    letter-spacing:.3px;
    cursor:pointer;
    transition:transform .15s, filter .2s, box-shadow .2s;
    white-space:nowrap;
    box-shadow:0 0 0 0 var(--glow);
  }
  button:hover{filter:brightness(1.1);box-shadow:0 0 22px var(--glow)}
  button:active{transform:scale(.97)}

  .note{
    font-size:.78rem;color:var(--muted);
    opacity:0;animation:rise .9s ease .85s forwards;
  }
  #msg{
    font-size:.9rem;min-height:1.2em;
    color:var(--accent);font-weight:600;
  }

  footer{
    position:relative;z-index:1;
    text-align:center;
    padding:24px;
    color:var(--muted);
    font-size:.78rem;
    letter-spacing:.4px;
  }

  @media(max-width:520px){
    form{flex-direction:column}
    button{width:100%}
  }
</style>

    <h1 class="tagline">Make your data uncompromisable.</h1>
    <p class="sub">Something is coming. Be the first to know.</p>

    <!-- Formspree: replace FORM_ID below with your real ID -->
    <form id="signup" action="https://formspree.io/f/mykvvnev" method="POST">
      <input type="email" name="email" placeholder="you@email.com" required aria-label="Email address">
      <button type="submit">Notify me</button>
    </form>
    <div id="msg" role="status"></div>
    <p class="note">No spam. Just the launch.</p>
  </main>

  <footer>© <span id="yr"></span> brnrr — All rights reserved.</footer>

<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  const form = document.getElementById('signup');
  const msg = document.getElementById('msg');

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const data = new FormData(form);
    msg.textContent = 'Sending…';
    try{
      const res = await fetch(form.action, {
        method:'POST',
        body:data,
        headers:{'Accept':'application/json'}
      });
      if(res.ok){
        form.reset();
        msg.textContent = "You're on the list. Talk soon.";
      }else{
        msg.textContent = 'Something went wrong — please try again.';
      }
    }catch(err){
      msg.textContent = 'Network error — please try again.';
    }
  });
</script>
